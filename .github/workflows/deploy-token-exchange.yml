name: Deploy Token Exchange Worker

on:
  push:
    paths:
      - workers/google-token-exchange/**
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.x

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/google-token-exchange
          secrets: |
            CLIENT_ID
            CLIENT_SECRET
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET }}
